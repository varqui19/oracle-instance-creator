name: Oracle Free Tier Creator

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

jobs:
  create-instance:
    runs-on: ubuntu-latest

    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install OCI SDK
        run: |
          pip install oci

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem

          chmod 600 ~/.oci/config
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Generate SSH Key
        run: |
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""

      - name: Create Oracle Instance
        run: |
          python3 <<EOF
          import oci
          import base64

          config = oci.config.from_file()

          compute = oci.core.ComputeClient(config)
          network = oci.core.VirtualNetworkClient(config)

          compartment_id = config["tenancy"]

          print("Searching subnet...")

          subnets = network.list_subnets(
              compartment_id=compartment_id
          ).data

          if not subnets:
              raise Exception("No subnet found")

          subnet_id = subnets[0].id

          print("Using subnet:", subnet_id)

          images = compute.list_images(
              compartment_id=compartment_id,
              operating_system="Canonical Ubuntu",
              operating_system_version="22.04"
          ).data

          image_id = images[0].id

          print("Using image:", image_id)

          with open("/home/runner/.ssh/id_rsa.pub") as f:
              ssh_key = f.read()

          details = oci.core.models.LaunchInstanceDetails(
              compartment_id=compartment_id,
              availability_domain="Uocm:EU-MADRID-1-AD-1",
              shape="VM.Standard.A1.Flex",
              shape_config=oci.core.models.LaunchInstanceShapeConfigDetails(
                  ocpus=4,
                  memory_in_gbs=24
              ),
              display_name="free-arm-server",
              create_vnic_details=oci.core.models.CreateVnicDetails(
                  subnet_id=subnet_id,
                  assign_public_ip=True
              ),
              source_details=oci.core.models.InstanceSourceViaImageDetails(
                  source_type="image",
                  image_id=image_id,
                  boot_volume_size_in_gbs=50
              ),
              metadata={
                  "ssh_authorized_keys": ssh_key
              }
          )

          print("Launching instance...")

          response = compute.launch_instance(details)

          print("SUCCESS")
          print(response.data.id)

          EOF
