name: Oracle Cloud Instance Creator

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

jobs:
  create-instance:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install \
            oci \
            cryptography \
            paramiko \
            requests \
            urllib3 \
            PyYAML \
            python-dotenv

      - name: Configure OCI
        env:
          OCI_CONFIG: ${{ secrets.OCI_CONFIG }}
          OCI_KEY: ${{ secrets.OCI_KEY }}
        run: |
          mkdir -p ~/.oci

          echo "$OCI_CONFIG" > ~/.oci/config
          echo "$OCI_KEY" > ~/.oci/oci_api_key.pem

          chmod 600 ~/.oci/config
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Clone automation repository
        run: |
          git clone https://github.com/mohankumarpaluru/oracle-freetier-instance-creation.git

      - name: Setup SSH key
        working-directory: oracle-freetier-instance-creation
        run: |
          mkdir -p ~/.ssh

          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""

          cp ~/.ssh/id_rsa.pub ./id_rsa.pub

      - name: Setup OCI environment
        working-directory: oracle-freetier-instance-creation
        env:
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          cp ~/.oci/config ./oci_config
          cp ~/.oci/oci_api_key.pem ./oci_api_private_key.pem

          cat > oci.env << EOF
          OCI_CONFIG=/home/runner/work/oracle-instance-creator/oracle-instance-creator/oracle-freetier-instance-creation/oci_config
          OCI_COMPARTMENT_OCID=$OCI_TENANCY
          OCI_REGION=$OCI_REGION
          OPERATING_SYSTEM=Canonical Ubuntu
          OS_VERSION=22.04
          DISPLAY_NAME=opencode-server
          SSH_AUTHORIZED_KEYS_FILE=./id_rsa.pub
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID=${{ secrets.TELEGRAM_USER_ID }}
          EOF

      - name: Run instance creator
        working-directory: oracle-freetier-instance-creation
        timeout-minutes: 10
        run: |
          python3 -u main.py
        continue-on-error: true
