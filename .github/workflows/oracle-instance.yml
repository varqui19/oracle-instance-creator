name: Oracle Cloud Instance Creator Automatic

on:
  workflow_dispatch: # Permite ejecutarlo manualmente si lo deseas
  schedule:
    - cron: '*/5 * * * *' # Ejecuta el flujo automáticamente cada 5 minutos

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        # Se agregan paramiko y el resto de librerías esenciales para el script
        run: |
          pip install oci cryptography requests paramiko
      
      - name: Configure OCI API Keys
        env:
          OCI_CONFIG: ${{ secrets.OCI_CONFIG }}
          OCI_KEY: ${{ secrets.OCI_KEY }}
        run: |
          mkdir -p ~/.oci
          echo "$OCI_CONFIG" > ~/.oci/config
          echo "$OCI_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
      
      - name: Clone automation repo
        run: |
          git clone https://github.com
      
      - name: Setup dynamic environment variables
        working-directory: oracle-freetier-instance-creation
        env:
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          # Copiamos las credenciales al directorio clonado
          cp ~/.oci/config ./oci_config
          cp ~/.oci/oci_api_key.pem ./oci_api_private_key.pem
          
          # Corregimos la ruta absoluta usando la variable dinámica $GITHUB_WORKSPACE de GitHub
          ABS_PATH="$GITHUB_WORKSPACE/oracle-freetier-instance-creation"
          
          # Construimos el archivo oci.env de forma segura
          cat > oci.env << EOF
          OCI_CONFIG=$ABS_PATH/oci_config
          OCI_COMPARTMENT_OCID=$OCI_TENANCY
          OCI_REGION=$OCI_REGION
          OPERATING_SYSTEM=Canonical Ubuntu
          OS_VERSION=22.04
          DISPLAY_NAME=opencode-server
          REQUEST_WAIT_TIME_SECS=15
          TELEGRAM_TOKEN=$TELEGRAM_BOT_TOKEN
          TELEGRAM_USER_ID=$TELEGRAM_USER_ID
          EOF
      
      - name: Run instance creator
        working-directory: oracle-freetier-instance-creation
        run: |
          # Ejecutamos el script. Este intentará crear la máquina de inmediato.
          python3 main.py
