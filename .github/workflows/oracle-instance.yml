name: Oracle Free Tier Creator

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

jobs:
  create-instance:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install OCI SDK
        run: |
          python -m pip install --upgrade pip
          pip install oci cryptography requests

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/oci_api_key.pem
          EOF

          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem

          chmod 600 ~/.oci/config
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Generate SSH Key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""

      - name: Try Create Oracle Instance
        continue-on-error: true
        run: |
          python3 -u <<EOF
          import oci
          import sys

          try:
              config = oci.config.from_file()

              identity = oci.identity.IdentityClient(config)
              compute = oci.core.ComputeClient(config)
              network = oci.core.VirtualNetworkClient(config)

              compartment_id = config["tenancy"]

              print("Getting availability domains...")

              ads = identity.list_availability_domains(
                  compartment_id=compartment_id
              ).data

              availability_domain = ads[0].name

              print("Using AD:", availability_domain)

              print("Searching subnet...")

              subnets = network.list_subnets(
                  compartment_id=compartment_id
              ).data

              if not subnets:
                  print("No subnet found")
                  sys.exit(0)

              subnet_id = subnets[0].id

              print("Using subnet:", subnet_id)

              print("Searching Ubuntu image...")

              images = compute.list_images(
                  compartment_id=compartment_id,
                  operating_system="Canonical Ubuntu",
                  operating_system_version="22.04"
              ).data

              if not images:
                  print("No Ubuntu image found")
                  sys.exit(0)

              image_id = images[0].id

              print("Using image:", image_id)

              with open("/home/runner/.ssh/id_rsa.pub") as f:
                  ssh_key = f.read()

              details = oci.core.models.LaunchInstanceDetails(
                  compartment_id=compartment_id,

                  availability_domain=availability_domain,

                  shape="VM.Standard.A1.Flex",

                  shape_config=oci.core.models.LaunchInstanceShapeConfigDetails(
                      ocpus=2,
                      memory_in_gbs=12
                  ),

                  display_name="free-arm-server",

                  create_vnic_details=oci.core.models.CreateVnicDetails(
                      subnet_id=subnet_id,
                      assign_public_ip=True
                  ),

                  source_details=oci.core.models.InstanceSourceViaImageDetails(
                      source_type="image",
                      image_id=image_id,
                      boot_volume_size_in_gbs=50
                  ),

                  metadata={
                      "ssh_authorized_keys": ssh_key
                  }
              )

              print("Launching instance...")

              response = compute.launch_instance(details)

              print("")
              print("SUCCESS")
              print("")
              print("INSTANCE CREATED:")
              print(response.data.id)

          except Exception as e:
              print("")
              print("INSTANCE CREATION FAILED")
              print("")
              print(str(e))
              print("")
              print("GitHub will retry in 5 minutes...")
              sys.exit(0)

          EOF
